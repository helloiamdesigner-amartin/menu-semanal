<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#4A7C59">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Casita">
  <meta name="description" content="Tu planificador de menús quincenal y gestor del hogar">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Casita</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">

  <!-- CSS — orden importa -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div id="app">

  <!-- ── Pantallas ─────────────────────────────────────── -->
  <div id="screen-container">

    <!-- Inicio -->
    <div id="screen-home" class="screen" role="main" aria-label="Inicio"></div>

    <!-- Plan / Menú -->
    <div id="screen-plan" class="screen" role="main" aria-label="Menú quincenal"></div>

    <!-- Lista de la compra -->
    <div id="screen-shopping" class="screen" role="main" aria-label="Lista de la compra"></div>

    <!-- Recetas -->
    <div id="screen-recipes" class="screen" role="main" aria-label="Recetas"></div>

    <!-- Mi Hogar -->
    <div id="screen-hogar" class="screen" role="main" aria-label="Mi Hogar"></div>

    <!-- Onboarding (primera vez) -->
    <div id="screen-onboarding" class="screen" role="main" aria-label="Bienvenida"></div>

  </div>

  <!-- ── Tab Bar ──────────────────────────────────────── -->
  <nav id="tab-bar" role="navigation" aria-label="Navegación principal">

    <button class="tab-item" data-tab="home"
      onclick="Router.navigate('home')" aria-label="Inicio">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </div>
      <span class="tab-label">Inicio</span>
    </button>

    <button class="tab-item" data-tab="plan"
      onclick="Router.navigate('plan')" aria-label="Plan">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="tab-label">Plan</span>
    </button>

    <!-- Central elevado (Compra) -->
    <button class="tab-item tab-primary" data-tab="shopping"
      onclick="Router.navigate('shopping')" aria-label="Compra">
      <div class="tab-icon-wrap">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
        </div>
      </div>
      <span class="tab-label" style="margin-top:2px;">Compra</span>
    </button>

    <button class="tab-item" data-tab="recipes"
      onclick="Router.navigate('recipes')" aria-label="Recetas">
      <div class="tab-icon">
        <svg viewBox="0 0 24 24">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
      </div>
      <span class="tab-label">Recetas</span>
    </button>

    <button class="tab-item" data-tab="hogar"
      onclick="Router.navigate('hogar')" aria-label="Mi Hogar">
      <div class="tab-icon" style="position:relative;">
        <svg viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="tab-label">Mi Hogar</span>
    </button>

  </nav>

  <!-- ── Overlay (sheets) ────────────────────────────── -->
  <div id="sheet-overlay"></div>

  <!-- ── Bottom Sheets ───────────────────────────────── -->

  <!-- Detalle de receta -->
  <div id="sheet-recipe-detail" class="bottom-sheet" role="dialog" aria-label="Detalle de receta"></div>

  <!-- Batch cooking -->
  <div id="sheet-batch-detail" class="bottom-sheet" role="dialog" aria-label="Batch cooking"></div>

  <!-- Valorar receta -->
  <div id="sheet-rate-recipe" class="bottom-sheet" role="dialog" aria-label="Valorar receta"></div>

  <!-- ── Toast container ─────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ── Update banner ───────────────────────────────── -->
  <div id="update-banner" class="hidden" role="alert"
    style="display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:430px;background:var(--c-primary);color:white;
    padding:12px var(--sp-lg);z-index:3000;align-items:center;justify-content:space-between;
    font-size:13px;">
  </div>

</div><!-- /#app -->

<!-- ════════════════════════════════════════════════════
     Scripts — orden de dependencias estricto
     ════════════════════════════════════════════════════ -->

<!-- Core -->
<script src="js/store.js"></script>
<script src="js/modules/utils.js"></script>

<!-- Módulos de negocio -->
<script src="js/modules/water.js"></script>
<script src="js/modules/ratings.js"></script>
<script src="js/modules/learning.js"></script>
<script src="js/modules/pantry.js"></script>
<script src="js/modules/freezer.js"></script>
<script src="js/modules/shopping.js"></script>
<script src="js/modules/menu.js"></script>
<script src="js/modules/batch.js"></script>
<script src="js/modules/notifications.js"></script>

<!-- Infraestructura -->
<script src="js/sync.js"></script>
<script src="js/router.js"></script>

<!-- Pantallas -->
<script src="js/screens/home.js"></script>
<script src="js/screens/plan.js"></script>
<script src="js/screens/shopping.js"></script>
<script src="js/screens/recipes.js"></script>
<script src="js/screens/hogar.js"></script>
<script src="js/screens/recipe-detail.js"></script>
<script src="js/screens/batch-detail.js"></script>

<!-- Entry point (siempre el último) -->
<script src="js/app.js"></script>

</body>
</html>
