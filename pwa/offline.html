<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4A7C59">
  <title>Casita — Sin conexión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #FAFAF8;
      color: #1C1C1E;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      text-align: center;
    }
    .container { max-width: 320px; }
    .icon     { font-size: 64px; margin-bottom: 24px; }
    h1        { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p         { font-size: 15px; color: #8E8E93; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #4A7C59;
      color: white;
      padding: 14px 32px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>Sin conexión</h1>
    <p>
      Casita funciona sin internet una vez instalada.<br>
      Abre la app desde el icono en tu pantalla de inicio.
    </p>
    <button class="btn" onclick="window.location.href='./index.html'">
      Volver a Casita
    </button>
  </div>
</body>
</html>
